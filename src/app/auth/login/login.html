<div class="flex justify-center items-center min-h-screen bg-gray-100 px-4">
  <div class="w-full max-w-md bg-white rounded-xl shadow-md p-8">

    <h1 class="text-2xl font-semibold text-gray-800 mb-6 text-center">
      Connexion Admin
    </h1>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="flex flex-col gap-4">

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
          Email
        </label>
        <input
          id="email"
          type="email"
          name="email"
          [(ngModel)]="credentials.email"
          required
          class="w-full px-3 py-2 border border-gray-300 rounded-md
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        >
      </div>

      <div>
        <label for="motDePasse" class="block text-sm font-medium text-gray-700 mb-1">
          Mot de passe
        </label>
        <input
          id="motDePasse"
          type="password"
          name="motDePasse"
          [(ngModel)]="credentials.motDePasse"
          required
          class="w-full px-3 py-2 border border-gray-300 rounded-md
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        >
      </div>

      @if (errorMessage()) {
        <p class="text-red-600 text-sm">{{ errorMessage() }}</p>
      }

      <button
        type="submit"
        [disabled]="!loginForm.valid || isLoading()"
        class="w-full bg-blue-600 text-white font-medium py-2 rounded-md
               hover:bg-blue-700 transition-colors
               disabled:bg-gray-400 disabled:cursor-not-allowed"
      >
        @if (isLoading()) {
          Connexion en cours...
        } @else {
          Se connecter
        }
      </button>

    </form>
  </div>
</div>
