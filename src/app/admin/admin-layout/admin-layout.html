<div class="flex min-h-screen bg-gray-50">

  <!-- Sidebar -->
  <aside class="w-64 bg-gray-900 text-white flex flex-col">
    <div class="p-6 border-b border-gray-700">
      <h2 class="text-xl font-bold">Mortall Admin</h2>
    </div>

    <nav class="flex-1 p-4 flex flex-col gap-1">
      <a routerLink="/admin/projets"
         routerLinkActive="bg-gray-700"
         class="px-4 py-2 rounded-md hover:bg-gray-800 transition-colors">
        Projets
      </a>
      <a routerLink="/admin/competences"
         routerLinkActive="bg-gray-700"
         class="px-4 py-2 rounded-md hover:bg-gray-800 transition-colors">
        Compétences
      </a>
      <a routerLink="/admin/messages"
         routerLinkActive="bg-gray-700"
         class="px-4 py-2 rounded-md hover:bg-gray-800 transition-colors">
        Messages
      </a>
    </nav>

    <div class="p-4 border-t border-gray-700">
      <button (click)="logout()"
              class="w-full text-left px-4 py-2 rounded-md text-red-400 hover:bg-gray-800 transition-colors">
        Déconnexion
      </button>
    </div>
  </aside>

  <!-- Contenu principal -->
  <main class="flex-1 p-8">
    <router-outlet></router-outlet>
  </main>

</div>
